# cargo-deny config for gossan.
#
# Run with: cargo deny check
#
# Three sub-checks: licenses (allow/deny by SPDX), advisories
# (RustSec DB), bans (yank crates with known maintainability
# concerns).

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

# ── Licenses ─────────────────────────────────────────────────────────
[licenses]
# License IDs are SPDX expressions. We allow the standard OSI/FSF
# combo plus a few permissive variants common in the Rust crate
# graph.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

# ── Bans ─────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ── Advisories ───────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ── Sources ──────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
