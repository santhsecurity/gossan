# ── Discovery / RPC / file shares ───────────────────────────────────────

[[probe]]
name = "PORTMAP_NULL"
ports = [111]
# RPC NULL call: xid=1, msg_type=0 (CALL), rpc_vers=2, prog=100000, vers=2, proc=0
payload = "0x80000028000000010000000000000002000186a000000002000000000000000000000000000000000000000000000000"
match_regex = "^\\x80\\x00\\x00..\\x00\\x00\\x00\\x01\\x00\\x00\\x00\\x01"

[[probe]]
name = "NETBIOS_NAME"
ports = [137]
payload = "0x82280000000100000000000020434b414141414141414141414141414141414141414141414141414141414141410000210001"
match_regex = "^\\x82\\x28"

[[probe]]
name = "SMB1_NEGOTIATE"
ports = [139, 445]
# NetBIOS session header + SMB1 negotiate protocol (PC NETWORK PROGRAM 1.0, LANMAN1.0, NT LM 0.12)
payload = "0x000000a4ff534d4272000000001853c800000000000000000000000000fffe00000000008100025043204e4554574f524b2050524f4752414d20312e30000244463330002344566c574f4d324d04020003200200034e54204c4d20302e313200"
match_regex = "(^\\x00\\x00\\x00.\\xffSMB|SMB|\\xfeSMB)"

[[probe]]
name = "SMB2_NEGOTIATE"
ports = [139, 445]
# NetBIOS session header + SMB2 negotiate (dialect 0x0202 = SMB 2.0.2)
payload = ""
match_regex = "(\\xfeSMB|^\\x00\\x00\\x00)"

[[probe]]
name = "RPC_BIND_GETPORT"
ports = [111]
# Portmap GETPORT call asking for nfs port
payload = "0x80000038000000020000000000000002000186a00000000200000003000000000000000000000000000000000000000000000000000186a300000003000000060000000000"
match_regex = "(^\\x80\\x00|^\\x80)"

