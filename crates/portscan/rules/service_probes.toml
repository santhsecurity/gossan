# Active service probes for the gossan portscan engine.
#
# Each `[[probe]]` defines:
#   * `name`           — human-readable identifier (also used as
#                        `fallback_probe` reference target)
#   * `ports`          — optional list of target ports; `None`/omitted
#                        means the probe runs on every open port
#   * `payload`        — bytes to send. If the string starts with `0x`
#                        the rest is parsed as hex; otherwise it is
#                        sent verbatim as ASCII (escape sequences in
#                        TOML strings — `\r`, `\n`, `\t`, `\u00..` —
#                        are honored by the deserializer)
#   * `match_regex`    — `regex::bytes::Regex` pattern matched against
#                        the response. Anchor with `^` to require the
#                        match at the start of the response (most
#                        banner protocols emit the version on the
#                        first line)
#   * `fallback_probe` — optional `name` of another probe to run after
#                        this one matches. Used to chain enrichment
#                        passes (e.g. HTTP_GET → HTTP_OPTIONS for
#                        verb advertisement)
#
# Conventions:
#   - Probes are ordered roughly by frequency in real-world scans
#     (HTTP first, then SSH, then mail/db/cache/RPC). The probe engine
#     runs probes in TOML order, so common services match early.
#   - `match_regex` patterns avoid pinning specific version numbers
#     so they don't go stale when vendors release a new minor version.
#     Service identification is the goal here; version extraction is
#     left to `gossan-techstack`'s parsing layer downstream.
#   - Probes that would otherwise mutate state (POST, DELETE, AUTH
#     attempts) are deliberately excluded. The engine MUST be safe to
#     run against unconsented hosts as part of recon — readonly
#     fingerprinting only.
#
# Wire-protocol references:
#   - nmap-service-probes:
#       https://github.com/nmap/nmap/blob/master/nmap-service-probes
#   - IANA service-name registry:
#       https://www.iana.org/assignments/service-names-port-numbers
#
# Adding a probe: write the [[probe]] block, run
# `cargo test -p gossan-portscan probes::tests` to validate the regex
# compiles + the toml parses, then `cargo run -p gossan-cli -- scan
# <local-test-host>` to verify it identifies the service end-to-end.

# ── HTTP family ─────────────────────────────────────────────────────────
# HTTP/1.x is by far the most common open service on internet-exposed
# hosts. We send a minimal GET / so we don't hit weird vhost-routing or
# SNI requirements; pure passive servers will respond on first byte.

[[probe]]
name = "HTTP_GET"
ports = [80, 81, 88, 443, 591, 593, 832, 981, 1010, 1311, 2480, 3000, 3128, 3333, 4243, 4567, 4711, 4712, 4993, 5000, 5104, 5108, 5800, 6543, 7000, 7396, 7474, 8000, 8001, 8008, 8014, 8042, 8069, 8080, 8081, 8088, 8090, 8091, 8118, 8123, 8172, 8222, 8243, 8280, 8281, 8333, 8443, 8500, 8834, 8880, 8888, 8983, 9000, 9043, 9060, 9080, 9090, 9091, 9200, 9443, 9800, 9981, 12443, 16080, 18091, 18092, 20720, 28017]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "^HTTP/[12]\\.[019] [0-9]{3}"

# HTTP/2 prior-knowledge preface. Modern API gateways accept this
# directly without ALPN. Catches servers that disable HTTP/1.1.
[[probe]]
name = "HTTP2_PREFACE"
ports = [443, 8080, 8443, 9090, 50051]
payload = "PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n"
# Connection preface frame is followed by SETTINGS frame from server;
# 0x000000 is the frame length prefix nginx/h2c stacks emit first.
match_regex = "^\\x00\\x00.{0,3}\\x04"

# OPTIONS often discloses Allow: headers + sometimes additional
# Server: detail not in the GET response. Safe + read-only.
[[probe]]
name = "HTTP_OPTIONS"
payload = "OPTIONS / HTTP/1.0\r\n\r\n"
match_regex = "^HTTP/[12]\\.[019] [0-9]{3}"

# ── Secure shell ────────────────────────────────────────────────────────
# SSH banner is sent immediately on TCP accept, so a null probe (zero
# bytes sent) catches it. The match anchors to `SSH-` which is the
# RFC 4253 protocol-version exchange prefix.

[[probe]]
name = "SSH_NULL"
ports = [22, 222, 2022, 2222, 22222]
payload = ""
match_regex = "^SSH-[12]\\."

# ── Mail family ─────────────────────────────────────────────────────────
# All mail protocols announce themselves on connect. Null probes work.
# match_regex pins the response code prefix (220 = ready, +OK = pop).

[[probe]]
name = "SMTP_NULL"
ports = [25, 465, 587, 2525]
payload = ""
match_regex = "^220[ \\-]"
fallback_probe = "SMTP_EHLO"

# EHLO advertises capabilities (STARTTLS, AUTH PLAIN, SIZE, etc).
# Use a plausible client name — some MTAs reject obviously-fake greets.
[[probe]]
name = "SMTP_EHLO"
ports = [25, 465, 587, 2525]
payload = "EHLO scan.example.com\r\n"
match_regex = "^250[ \\-]"

[[probe]]
name = "POP3_NULL"
ports = [110, 995]
payload = ""
match_regex = "^\\+OK"

[[probe]]
name = "IMAP_NULL"
ports = [143, 993]
payload = ""
match_regex = "^\\* OK"

# ── DNS ─────────────────────────────────────────────────────────────────
# version.bind chaos-class TXT query — RFC 4892. BIND, PowerDNS,
# Unbound, Knot, NSD all answer this (some redact the version, but the
# response shape itself is diagnostic). 2-byte length-prefix is required
# for TCP DNS (RFC 1035 §4.2.2).
[[probe]]
name = "DNS_VERSION_BIND"
ports = [53]
# 2-byte length (0x001e = 30 bytes) + standard DNS query for
# version.bind CHAOS TXT. Hex-encoded so the binary stays exact.
payload = "0x001e0006010000010000000000000776657273696f6e0462696e640000100003"
# Response begins with the 2-byte length prefix + transaction id 0x0006.
# A non-empty answer section means the server replied (regardless of
# whether the version is redacted).
match_regex = "^.{2}\\x00\\x06[\\x80-\\x87]"

# ── Database family ─────────────────────────────────────────────────────
# All major database servers banner-leak on accept; a null probe is
# enough. The match patterns are anchored to wire-protocol magic bytes
# so they won't false-positive on text protocols listening on the same
# port.

# MySQL / MariaDB greeting packet starts with a 3-byte length prefix
# + 1-byte sequence (always 0x00) + protocol version 10.
[[probe]]
name = "MYSQL_NULL"
ports = [3306, 33060]
payload = ""
match_regex = "^.{3}\\x00\\x0a[345]\\."

# PostgreSQL needs an explicit StartupMessage to talk; null returns
# nothing. We send a v3.0 startup with a dummy `user` parameter — this
# elicits an AuthenticationRequest or ErrorResponse (both diagnostic).
# Bytes: int32 length=23, int32 protocol=196608 (0x00030000), "user\0scan\0\0".
[[probe]]
name = "POSTGRES_STARTUP"
ports = [5432, 5433]
payload = "0x00000017000300007573657200736361006e0000"
# 'R' = AuthenticationRequest, 'E' = ErrorResponse. Either confirms PG.
match_regex = "^[RE]"

# Redis RESP "INFO" reply starts with a $<length>\r\n bulk string
# header followed by `redis_version:`.
[[probe]]
name = "REDIS_INFO"
ports = [6379, 6380, 16379]
payload = "INFO\r\n"
match_regex = "^\\$\\d+\\r\\nredis_version:"

# Some Redis instances are protected-mode only (refuse INFO from
# non-loopback). They respond with "-DENIED" or "-NOAUTH" — both
# confirm Redis without giving us version detail.
[[probe]]
name = "REDIS_DENIED"
ports = [6379, 6380, 16379]
payload = "INFO\r\n"
match_regex = "^-(NOAUTH|DENIED|ERR)"

# Memcached "version" gives back "VERSION 1.6.x\r\n".
[[probe]]
name = "MEMCACHED_VERSION"
ports = [11211, 11212]
payload = "version\r\n"
match_regex = "^VERSION "

# MongoDB wire protocol — OP_QUERY for the `isMaster` admin command.
# Modern Mongo returns a 4-byte message length followed by request id
# matching what we sent. The `2a000000` length here is 42 decimal.
# Hex was extracted from a captured Mongo handshake.
[[probe]]
name = "MONGO_ISMASTER"
ports = [27017, 27018, 27019, 28017]
payload = "0x3a00000001000000000000d40700000000000061646d696e2e24636d640000000000ffffffff13000000106973026d6173746572000100000000"
# Response begins with a 4-byte length and reply opcode 0x000007d1.
match_regex = "^.{4}.{4}.{4}\\xd1\\x07\\x00\\x00"

# ── Caches / KV / message brokers ───────────────────────────────────────

# AMQP 0.9.1 server greeting. Client opens a TCP connection then waits
# for the server to send the protocol header — we elicit it by sending
# the AMQP protocol-version preamble ourselves.
[[probe]]
name = "AMQP_PROTO_HEADER"
ports = [5672, 5671]
payload = "0x414d515000000901"
# Server replies with frame type 0x01 (method) + channel 0 + class 10
# (Connection) + method 10 (Start). The Connection.Start payload begins
# with the version-major/minor bytes.
match_regex = "^\\x01\\x00\\x00\\x00.{4}\\x00\\x0a\\x00\\x0a"

# RabbitMQ Management plugin (HTTP API) on 15672 → falls through to
# HTTP_GET probe naturally; no separate entry needed.

# ── Remote desktop / VNC ────────────────────────────────────────────────

# RFB protocol version handshake — server announces "RFB 003.008\n" or
# similar on accept. Pure null probe; confirms VNC family.
[[probe]]
name = "VNC_RFB"
ports = [5900, 5901, 5902, 5903, 5904, 5905, 5906, 5907, 5908, 5909]
payload = ""
match_regex = "^RFB \\d{3}\\.\\d{3}\\n"

# RDP X.224 connection request. Triggers a connection confirmation
# from any RDP listener; safe + non-mutating. Hex extracted from
# Wireshark capture against a Windows Server 2019 host.
[[probe]]
name = "RDP_X224"
ports = [3389]
payload = "0x030000130ee000000000000100080000000000"
# Server replies with X.224 connection confirm — TPKT version 03 +
# reserved 00 + length + COTP TPDU type 0xd0 (CC).
match_regex = "^\\x03\\x00\\x00.\\x06\\xd0"

# ── Telnet / Rsync / IRC / NNTP ─────────────────────────────────────────
# All banner-on-connect protocols.

[[probe]]
name = "TELNET_NULL"
ports = [23, 992]
payload = ""
# IAC sequences (0xff) in the first three bytes are diagnostic of
# telnet's option-negotiation greeting.
match_regex = "^\\xff[\\xfb-\\xfe]"

[[probe]]
name = "RSYNC_NULL"
ports = [873]
payload = ""
match_regex = "^@RSYNCD: "

[[probe]]
name = "IRC_NULL"
ports = [6660, 6661, 6662, 6663, 6664, 6665, 6666, 6667, 6668, 6669, 6697, 7000]
payload = ""
match_regex = "^(NOTICE|:|ERROR)"

[[probe]]
name = "NNTP_NULL"
ports = [119, 433, 563]
payload = ""
match_regex = "^200 "

# ── Container / orchestration ───────────────────────────────────────────

# Docker daemon HTTP API on 2375 (cleartext). HTTP_GET probe will
# match; this entry exists to surface the daemon-specific Docker-API
# header in the engine's per-port metadata.
[[probe]]
name = "DOCKER_API"
ports = [2375, 2376]
payload = "GET /version HTTP/1.0\r\n\r\n"
match_regex = "Docker"

# Kubernetes API server identifies itself in the response body of an
# unauthenticated /version request.
[[probe]]
name = "KUBERNETES_API"
ports = [6443, 8080, 10250, 10255]
payload = "GET /version HTTP/1.0\r\n\r\n"
match_regex = "(kubernetes|gitVersion|gitCommit)"

# Etcd v2 + v3 versions endpoint.
[[probe]]
name = "ETCD_VERSION"
ports = [2379, 2380, 4001, 7001]
payload = "GET /version HTTP/1.0\r\n\r\n"
match_regex = "(etcdserver|etcdcluster)"

# ── LDAP ────────────────────────────────────────────────────────────────
# AnonymousBindRequest, BER-encoded. Triggers a bind response from any
# LDAP listener regardless of whether anon binds are permitted.
[[probe]]
name = "LDAP_ANON_BIND"
ports = [389, 636, 3268, 3269]
payload = "0x300c020101600702010304008000"
# Response is a SEQUENCE (0x30) containing a BindResponse (0x61).
match_regex = "^\\x30.{1,3}\\x02\\x01\\x01\\x61"

# ── Generic TLS — last-resort probe ─────────────────────────────────────
# A minimal TLS 1.0 ClientHello. Most modern TLS servers respond with
# either a ServerHello (0x16) or an Alert (0x15) — both confirm TLS
# even without exposing the certificate (which the gossan-portscan TLS
# inspector handles separately downstream).
[[probe]]
name = "TLS_CLIENT_HELLO"
payload = "0x160301002e010000"
# 0x16 = handshake content type, 0x15 = alert content type. Followed by
# the protocol version (0x03 0x0..0x04 for TLS 1.0..1.3).
match_regex = "^[\\x15\\x16]\\x03[\\x00-\\x04]"

# ── HTTP method/header variants ─────────────────────────────────────────
# Most middleware/WAFs treat these methods differently and the
# response (or rejection) is itself a fingerprint signal.

[[probe]]
name = "HTTP_HEAD"
payload = "HEAD / HTTP/1.0\r\n\r\n"
match_regex = "^HTTP/[12]\\.[019] [0-9]{3}"

[[probe]]
name = "HTTP_TRACE"
payload = "TRACE / HTTP/1.0\r\n\r\n"
match_regex = "^HTTP/[12]\\.[019] (200|405|501)"

[[probe]]
name = "HTTP_PROPFIND"
ports = [80, 443, 8080, 8443]
payload = "PROPFIND / HTTP/1.0\r\nDepth: 0\r\n\r\n"
match_regex = "(HTTP/[12]\\.[019] (207|405|501)|<[Dd]:multistatus)"

[[probe]]
name = "HTTP_CONNECT_PROBE"
payload = "CONNECT example.com:443 HTTP/1.0\r\n\r\n"
match_regex = "^HTTP/[12]\\.[019] (200|403|405|407|502)"

[[probe]]
name = "HTTP_INVALID_METHOD"
payload = "FOOBAR / HTTP/1.0\r\n\r\n"
match_regex = "^HTTP/[12]\\.[019] (400|405|501)"

# ── Common HTTP path fingerprints ───────────────────────────────────────
# These probe well-known endpoints whose presence or response shape
# uniquely identifies a framework or admin surface.

[[probe]]
name = "HTTP_ROBOTS_TXT"
payload = "GET /robots.txt HTTP/1.0\r\n\r\n"
match_regex = "(User-[Aa]gent:|Disallow:)"

[[probe]]
name = "HTTP_FAVICON"
payload = "GET /favicon.ico HTTP/1.0\r\n\r\n"
match_regex = "(image/(x-icon|vnd\\.microsoft\\.icon|png)|^HTTP/[12]\\.[019] 200)"

[[probe]]
name = "HTTP_SERVER_STATUS"
ports = [80, 443, 8080, 8443]
payload = "GET /server-status HTTP/1.0\r\n\r\n"
match_regex = "(Apache Server Status|<title>Apache Status</title>)"

[[probe]]
name = "HTTP_SERVER_INFO"
ports = [80, 443, 8080, 8443]
payload = "GET /server-info HTTP/1.0\r\n\r\n"
match_regex = "(Apache Server Information|Server Settings|MPM Information)"

[[probe]]
name = "HTTP_NGINX_STATUS"
ports = [80, 443, 8080, 8443]
payload = "GET /nginx_status HTTP/1.0\r\n\r\n"
match_regex = "(Active connections:|server accepts handled requests)"

[[probe]]
name = "HTTP_PHPINFO"
ports = [80, 443, 8080, 8443]
payload = "GET /phpinfo.php HTTP/1.0\r\n\r\n"
match_regex = "(PHP Version|<title>phpinfo\\(\\)</title>)"

[[probe]]
name = "HTTP_WORDPRESS_LOGIN"
payload = "GET /wp-login.php HTTP/1.0\r\n\r\n"
match_regex = "(WordPress|wp-login|<form name=\"loginform\")"

[[probe]]
name = "HTTP_PHPMYADMIN"
payload = "GET /phpmyadmin/ HTTP/1.0\r\n\r\n"
match_regex = "(phpMyAdmin|pma_)"

[[probe]]
name = "HTTP_GIT_HEAD"
payload = "GET /.git/HEAD HTTP/1.0\r\n\r\n"
match_regex = "^ref: refs/"

[[probe]]
name = "HTTP_DOTENV_LEAK"
payload = "GET /.env HTTP/1.0\r\n\r\n"
match_regex = "(APP_KEY=|DB_PASSWORD=|AWS_ACCESS_KEY_ID=|SECRET_KEY=)"

[[probe]]
name = "HTTP_ACTUATOR_HEALTH"
ports = [8080, 8081, 8443, 9090, 9091]
payload = "GET /actuator/health HTTP/1.0\r\n\r\n"
match_regex = "(\"status\":\\s*\"UP\"|\"status\":\\s*\"DOWN\")"

[[probe]]
name = "HTTP_ACTUATOR_ENV"
ports = [8080, 8081, 8443, 9090, 9091]
payload = "GET /actuator/env HTTP/1.0\r\n\r\n"
match_regex = "(\"activeProfiles\"|propertySources)"

[[probe]]
name = "HTTP_METRICS"
ports = [9090, 9100, 9091, 9093, 9100, 9115, 9100]
payload = "GET /metrics HTTP/1.0\r\n\r\n"
match_regex = "(# HELP|# TYPE)"

[[probe]]
name = "HTTP_PROMETHEUS"
ports = [9090]
payload = "GET /api/v1/status/buildinfo HTTP/1.0\r\n\r\n"
match_regex = "(\"version\"|prometheus)"

[[probe]]
name = "HTTP_GRAFANA"
ports = [3000, 8000, 8080, 8443]
payload = "GET /api/health HTTP/1.0\r\n\r\n"
match_regex = "(\"database\":\\s*\"ok\"|grafana)"

# ── Cloud metadata services ─────────────────────────────────────────────
# 169.254.169.254 etc — surfacing one of these on a non-cloud host is
# an SSRF-honeypot/mimic indicator; on a cloud host, normal.

[[probe]]
name = "HTTP_AWS_METADATA"
payload = "GET /latest/meta-data/ HTTP/1.0\r\nHost: 169.254.169.254\r\n\r\n"
match_regex = "(ami-id|instance-id|hostname|^HTTP/[12]\\.[019] 401)"

[[probe]]
name = "HTTP_GCP_METADATA"
payload = "GET /computeMetadata/v1/ HTTP/1.0\r\nHost: metadata.google.internal\r\nMetadata-Flavor: Google\r\n\r\n"
match_regex = "(computeMetadata|^HTTP/[12]\\.[019] (200|403))"

# ── Mail family expansion ───────────────────────────────────────────────

[[probe]]
name = "SMTPS_NULL"
ports = [465]
payload = ""
match_regex = "^[\\x15\\x16]\\x03[\\x00-\\x04]"

[[probe]]
name = "SUBMISSION_EHLO"
ports = [587]
payload = "EHLO scan.example.com\r\n"
match_regex = "^220 .*(SMTP|ESMTP|Postfix|Sendmail|Exim|Microsoft|MailEnable)"

[[probe]]
name = "POP3S_NULL"
ports = [995]
payload = ""
match_regex = "^[\\x15\\x16]\\x03[\\x00-\\x04]"

[[probe]]
name = "IMAPS_NULL"
ports = [993]
payload = ""
match_regex = "^[\\x15\\x16]\\x03[\\x00-\\x04]"

[[probe]]
name = "IMAP_CAPABILITY"
ports = [143, 993]
payload = "a001 CAPABILITY\r\n"
match_regex = "(\\* CAPABILITY|IMAP4rev[12])"

[[probe]]
name = "POP3_CAPA"
ports = [110, 995]
payload = "CAPA\r\n"
match_regex = "(\\+OK|UIDL|TOP\\b)"

[[probe]]
name = "MANAGESIEVE"
ports = [4190]
payload = ""
match_regex = "(IMPLEMENTATION|SIEVE|MANAGESIEVE)"

[[probe]]
name = "EXCHANGE_OWA"
ports = [443, 80, 8080, 8443]
payload = "GET /owa/ HTTP/1.0\r\n\r\n"
match_regex = "(Microsoft\\-IIS|/owa/auth|X-OWA-Version)"

[[probe]]
name = "EXCHANGE_AUTODISCOVER"
ports = [443]
payload = "GET /Autodiscover/Autodiscover.xml HTTP/1.0\r\n\r\n"
match_regex = "(Autodiscover|Microsoft\\-IIS)"

[[probe]]
name = "EXCHANGE_EWS"
ports = [443]
payload = "GET /EWS/Exchange.asmx HTTP/1.0\r\n\r\n"
match_regex = "(EWS|Microsoft\\-IIS|ExchangeServer)"

# ── Database family expansion ───────────────────────────────────────────

[[probe]]
name = "CASSANDRA_OPTIONS"
ports = [9042, 9142]
# CQL frame v4 OPTIONS opcode
payload = "0x0400000005000000000000"
match_regex = "(^\\x84\\x00|CQL_VERSION|COMPRESSION)"

[[probe]]
name = "COUCHDB_ROOT"
ports = [5984, 6984]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(\"couchdb\":\\s*\"Welcome\"|\"version\":\\s*\")"

[[probe]]
name = "INFLUXDB_PING"
ports = [8086, 8088, 8089]
payload = "GET /ping HTTP/1.0\r\n\r\n"
match_regex = "(X-Influxdb-Version|^HTTP/[12]\\.[019] 204)"

[[probe]]
name = "INFLUXDB_HEALTH"
ports = [8086, 8088]
payload = "GET /health HTTP/1.0\r\n\r\n"
match_regex = "(\"name\":\\s*\"influxdb\"|\"status\":\\s*\"pass\")"

[[probe]]
name = "CLICKHOUSE_PING"
ports = [8123, 8443, 9000]
payload = "GET /ping HTTP/1.0\r\n\r\n"
match_regex = "^Ok\\.|X-ClickHouse"

[[probe]]
name = "CLICKHOUSE_REPLICAS"
ports = [8123]
payload = "GET /replicas_status HTTP/1.0\r\n\r\n"
match_regex = "(Ok\\.|delay)"

[[probe]]
name = "ELASTICSEARCH_ROOT"
ports = [9200, 9300]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(\"cluster_name\"|\"tagline\"\\s*:\\s*\"You Know, for Search\"|elasticsearch)"

[[probe]]
name = "ELASTICSEARCH_NODES"
ports = [9200]
payload = "GET /_nodes HTTP/1.0\r\n\r\n"
match_regex = "(\"nodes\"|\"cluster_name\")"

[[probe]]
name = "OPENSEARCH_ROOT"
ports = [9200, 9201]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(opensearch|distribution)"

[[probe]]
name = "SOLR_ADMIN"
ports = [8983, 8984]
payload = "GET /solr/admin/info/system HTTP/1.0\r\n\r\n"
match_regex = "(Solr|solr-spec-version)"

[[probe]]
name = "RETHINKDB_HTTP"
ports = [8080, 28015]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(RethinkDB|rethinkdb-)"

[[probe]]
name = "ARANGODB_VERSION"
ports = [8529]
payload = "GET /_api/version HTTP/1.0\r\n\r\n"
match_regex = "(\"server\":\\s*\"arango\"|arangodb)"

[[probe]]
name = "NEO4J_HTTP"
ports = [7474, 7473, 7687]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(\"neo4j_version\"|management|browser)"

[[probe]]
name = "RIAK_PING"
ports = [8087, 8098]
payload = "GET /ping HTTP/1.0\r\n\r\n"
match_regex = "^OK"

[[probe]]
name = "AEROSPIKE_INFO"
ports = [3000, 3001, 3002, 3003]
# Aerospike 'INFO' message header + 'version\n' command
payload = "0x02010000000000000876657273696f6e0a"
match_regex = "(version|build|edition)"

[[probe]]
name = "HAZELCAST_REST"
ports = [5701, 5702, 5703]
payload = "GET /hazelcast/rest/management/cluster/version HTTP/1.0\r\n\r\n"
match_regex = "(hazelcast|clusterVersion)"

[[probe]]
name = "MARIADB_NULL"
ports = [3306, 3307]
payload = ""
match_regex = "(MariaDB|mysql_native|caching_sha2)"

[[probe]]
name = "TIDB_NULL"
ports = [4000]
payload = ""
match_regex = "(TiDB|MySQL|mysql_native)"

[[probe]]
name = "MSSQL_PRELOGIN"
ports = [1433, 1434]
# TDS prelogin: type=0x12, length=0x0027 minimal
payload = "0x12010002700000000000150006010019000100200001000300210000040022"
match_regex = "(^\\x04\\x01|TDS|SQL Server|Microsoft)"

[[probe]]
name = "ORACLE_TNS"
ports = [1521, 1522, 1523, 1524, 1525, 1526]
# TNS connect packet (truncated header that triggers a NACK with version)
payload = "0x000d000000010000040004000000"
match_regex = "(TNS|ORA\\-|Oracle)"

# ── Container, orchestration, secrets ──────────────────────────────────

[[probe]]
