# ── Final fallback / ALPN sniff ───────────────────────────────────────

[[probe]]
name = "GENERIC_NULL_BANNER"
payload = ""
# Many text-banner protocols emit something printable in the first 64
# bytes. Run last so port-specific probes win first.
match_regex = "[\\x20-\\x7e]{4,}"

# ── Top-up: a final tier of less-common but real services ──────────────

[[probe]]
name = "FTP_NULL"
ports = [21, 990, 2121]
payload = ""
match_regex = "^220[\\- ].*(FTP|FileZilla|vsftpd|ProFTPD|Pure-FTPd)"

[[probe]]
name = "FTPS_AUTH_TLS"
ports = [21]
payload = "AUTH TLS\r\n"
match_regex = "^234"

[[probe]]
name = "TFTP_RRQ_DENIED"
ports = [69]
# Read request for nonexistent file; server replies error (5)
payload = "0x00016e6f6e652e747874006e657461736369690000"
match_regex = "(^\\x00\\x05|tftp)"

[[probe]]
name = "GOPHER_NULL"
ports = [70]
payload = "\r\n"
match_regex = "^[ifg.0-9]"

[[probe]]
name = "FINGER_NULL"
ports = [79]
payload = "\r\n"
match_regex = "(Login|Welcome|finger)"

[[probe]]
name = "SOCKS5_NEGOTIATE"
ports = [1080, 1081, 1085, 9050, 9150]
# VER=5, NMETHODS=1, METHOD=0 (no-auth)
payload = "0x050100"
match_regex = "(^\\x05[\\x00\\xff]|SOCKS)"

[[probe]]
name = "QUASSEL_CORE"
ports = [4242, 4243]
# 4-byte feature/init; servers reply with version handshake
payload = "0x00000020"
match_regex = "(quassel|Quassel)"

[[probe]]
name = "PUPPET_CA"
ports = [8140, 8141]
payload = "GET /production/status/test HTTP/1.0\r\n\r\n"
match_regex = "(puppet|^HTTP/[12]\\.[019] (200|401|403))"

[[probe]]
