ports = [8000, 8080]
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(saltstack|salt-api|return)"

[[probe]]
name = "PYTHON_HTTPSERVER"
payload = "GET / HTTP/1.0\r\n\r\n"
match_regex = "(SimpleHTTP/|BaseHTTP/|Server: SimpleHTTP)"

[[probe]]
