# Community CVE detection rules — drop-in extension to the built-in set.
# Loader: crates/portscan/src/cve.rs::load_community_rules
#
# Pattern matching: case-insensitive substring search against the raw
# banner. Order: built-ins first, this file appended.
#
# Each [[rule]] requires: pattern, cve, cvss, severity, description.
# `exploit` is optional; if set, `TARGET` is replaced at runtime.

# ── Web servers / proxies ────────────────────────────────────────────────

[[rule]]
pattern = "apache/2.4.51"
cve = "CVE-2021-42013"
cvss = 9.8
severity = "critical"
description = "Apache 2.4.51 — patch for 41773/42013 incomplete in some configs."

